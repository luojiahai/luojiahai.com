name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build

      # The build targets Cloudflare Workers; GitHub Pages serves only the
      # prerendered static output. The worker-only pieces degrade as follows:
      # - "/" locale redirect -> static index.html below
      # - /api/social live stats -> committed fallback snapshot
      # - extensionless /feed* RSS routes -> not served
      - name: Prepare static site
        run: |
          mkdir _site
          cp -R .svelte-kit/cloudflare/. _site/
          rm -f _site/_worker.js _site/_headers _site/.assetsignore
          cp .github/pages/index.html _site/index.html
          cp .github/pages/404.html _site/404.html
          echo "luojiahai.com" > _site/CNAME
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
