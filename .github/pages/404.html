<!doctype html>
<!-- Static 404 for GitHub Pages, echoing the site's "out of paper" theme. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Out of Paper · luojiahai</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ece9e2;
        color: #2c2c32;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #17191f;
          color: #e8e6e3;

        padding: 2rem;

        opacity: 0.7;
      }

        display: inline-block;
        margin-top: 1rem;
