<!doctype html>
<!-- Static locale redirect for GitHub Pages. On Cloudflare Workers this is
     handled server-side by src/hooks.server.ts. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>luojiahai</title>
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://luojiahai.com/en" />
    <script>
      var lang = (navigator.language || "en").toLowerCase().indexOf("zh") === 0 ? "zh" : "en";
      location.replace("/" + lang);
    </script>
    <meta http-equiv="refresh" content="0; url=/en" />
  </head>
  <body>
    <a href="/en">luojiahai.com/en</a>
  </body>
</html>
